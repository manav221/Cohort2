<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.9.0/fonts/remixicon.css" rel="stylesheet" />
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <main>
        <nav>
            <div class="add-photo-btn">
                <label for="fileInput">
                    <i class="ri-image-add-line"></i>
                    <span>Add Photo</span>
                </label>
                <input type="file" accept=".png,.jpg" id="fileInput" class="hidden">
            </div>
            <div class="more-options">
                <i class="ri-more-2-line more-icon"></i>
                <div class="options hidden">
                    <div class="download-btn nav-btn">
                        <i class="ri-download-line download-btn"></i>
                        <span class="download-btn">Download</span>
                    </div>
                    <div class="reset-btn nav-btn">
                        <i class="ri-reset-right-fill reset-btn"></i>
                        <span class="reset-btn">Reset</span>
                    </div>
                </div>
            </div>
        </nav>
        <section class="view1">
            <canvas class="img-container"></canvas>
            
            <div class="edit-adjust-options">
                <div class="adjust-opt white-balance">
                    <div class="adjust-icon">
                        <i class="ri-lightbulb-line"></i>
                        <span>White balance</span>
                    </div>
                    <div class="temperature adjust">
                        <span>Temperature</span>
                        <input type="range" name="" id="" min="-100" max="100" value="0">
                    </div>
                    <div class="tint adjust">
                        <span>Tint</span>
                        <input type="range" name="" id="" min="-100" max="100" value="0">
                    </div>
                </div>
                <div class="adjust-opt light">
                    <div class="adjust-icon">
                        <i class="ri-sun-line"></i>
                        <span>Light</span>
                    </div>
                    <div class="brightness adjust">
                        <span>Brightness</span>
                        <input type="range" name="" id="" min="-100" max="100" value="0">
                    </div>
                    <div class="contrast adjust">
                        <span>Contrast</span>
                        <input type="range" name="" id="" min="-100" max="100" value="0">
                    </div>
                    <div class="highlights adjust">
                        <span>Highlights</span>
                        <input type="range" name="" id="" min="-100" max="100" value="0">
                    </div>
                    <div class="shadows adjust">
                        <span>Shadows</span>
                        <input type="range" name="" id="" min="-100" max="100" value="0">
                    </div>
                    <div class="whites adjust">
                        <span>Whites</span>
                        <input type="range" name="" id="" min="-100" max="100" value="0">
                    </div>
                    <div class="blacks adjust">
                        <span>Blacks</span>
                        <input type="range" name="" id="" min="-100" max="100" value="0">
                    </div>
                </div>
                <div class="presets">
                    <h3>Presets</h3>
                    <div class="all-presets">
                    </div>
                </div>
            </div>
        </section>
    </main>

    <script src="script.js"></script>
</body>

</html>
